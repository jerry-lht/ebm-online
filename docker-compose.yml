services:
  postgres:
    image: postgres:16-alpine
    container_name: ebm-postgres
    environment:
      POSTGRES_USER: ebm
      POSTGRES_PASSWORD: ebm123
      POSTGRES_DB: ebm_online
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - ebm-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ebm -d ebm_online"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: ebm-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - ebm-net

  redis:
    image: redis:7-alpine
    container_name: ebm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ebm-net

volumes:
  pg_data:
    driver: local
  es_data:
    driver: local
  redis_data:
    driver: local

networks:
  ebm-net:
    driver: bridge
