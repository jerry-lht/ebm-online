providers:
  - provider: openai
    model: gpt-5.4-mini
    api_key_env: OPENAI_API_KEY
    timeout_seconds: 60
    temperature: 0.0
    max_tokens: 1200
    max_retries: 2
    retry_backoff_seconds: 1.0
  - provider: openai-compatible
    model: gpt-5.4-mini
    base_url: https://api.zyai.online/v1
    api_key_env: OPENAI_COMPATIBLE_API_KEY
    timeout_seconds: 120
    temperature: 0.0
    max_tokens: 1200
    max_retries: 2
    retry_backoff_seconds: 1.0
