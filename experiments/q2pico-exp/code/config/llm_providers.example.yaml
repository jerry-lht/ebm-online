defaults:
  timeout_seconds: 120
  temperature: 0

providers:
  openai:
    api_key_env: OPENAI_API_KEY
    api_key: FILL_ME
    model_id: FILL_ME
    model_version: FILL_ME
    base_url: https://api.openai.com/v1
    api_mode: responses

  deepseek:
    api_key_env: DEEPSEEK_API_KEY
    api_key: FILL_ME
    model_id: FILL_ME
    model_version: FILL_ME
    base_url: https://api.deepseek.com
    api_mode: chat_completions
